name: GOAP 自動検証

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:

env:
  LANG: C.UTF-8
  LC_ALL: C.UTF-8
  UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
  UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
  UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}

jobs:
  goap-ci:
    name: GOAP 検証（EditMode + バッチ）
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - name: リポジトリ取得
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Unity Library キャッシュ
        uses: actions/cache@v4
        id: unity-library-cache
        with:
          path: Library
          key: Library-v1-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-v1-

      - name: GOAP 検証実行
        run: |
          chmod +x scripts/ci/run-goap-docker.sh
          scripts/ci/run-goap-docker.sh all

      - name: ログをアップロード
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: goap-ci-logs
          path: |
            Logs/goap-editmode-tests.log
            Logs/goap-editmode-results.xml
            Logs/goap-batch-verify.log
            Logs/goap-batch-wing-verify.log
            Logs/goap-batch-cf-drive-verify.log
            Logs/goap-batch-result.txt
            Logs/goap-batch-wing-result.txt
            Logs/goap-batch-cf-drive-result.txt
            Logs/ci-unity-activate.log
            Logs/GoapDiag_latest.txt
            Logs/GoapDiag_wing_latest.txt
            Logs/GoapDiag_cf_drive_latest.txt
            Logs/GoapSummary_latest.txt
            Logs/GoapSummary_wing_latest.txt
            Logs/GoapSummary_cf_drive_latest.txt
            Assets/DebugLog/GoapDiag_latest.txt
            Assets/DebugLog/GoapSummary_latest.txt
