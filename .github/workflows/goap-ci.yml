name: GOAP CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:

env:
  UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
  UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
  UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}

jobs:
  editmode-geometry:
    name: EditMode geometry tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: EditMode tests
        run: |
          chmod +x scripts/ci/run-goap-editmode-docker.sh
          scripts/ci/run-goap-editmode-docker.sh

      - name: Upload EditMode logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: goap-editmode-logs
          path: |
            Logs/goap-editmode-tests.log
            Logs/goap-editmode-results.xml
            Logs/ci-unity-activate.log

  combined-batch-verify:
    name: Combined support batch verify
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: GOAP batch verify
        run: |
          chmod +x scripts/ci/run-goap-batch-verify-docker.sh
          scripts/ci/run-goap-batch-verify-docker.sh

      - name: Upload batch logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: goap-batch-logs
          path: |
            Logs/goap-batch-verify.log
            Logs/goap-batch-result.txt
            Logs/ci-unity-activate.log
            Logs/GoapDiag_latest.txt
            Logs/GoapSummary_latest.txt
            Assets/DebugLog/GoapDiag_latest.txt
            Assets/DebugLog/GoapSummary_latest.txt
