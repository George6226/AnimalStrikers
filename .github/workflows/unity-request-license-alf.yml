name: Request Unity CI license ALF

# ローカルに Docker Desktop がなくても CI 用 .alf を取得できる。
# 1) Actions → このワークフロー → Run workflow
# 2) Artifacts から .alf をダウンロード
# 3) https://license.unity3d.com/manual にアップロード → .ulf を取得
# 4) .ulf の XML 全文を GitHub Secret UNITY_LICENSE に登録
on:
  workflow_dispatch:

jobs:
  activation:
    name: Request manual activation file
    runs-on: ubuntu-latest
    steps:
      - name: Request activation file
        id: getManualLicenseFile
        uses: game-ci/unity-request-activation-file@v2
        with:
          unityVersion: 6000.2.7f2

      - name: Upload ALF artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity-ci-manual-activation-alf
          path: ${{ steps.getManualLicenseFile.outputs.filePath }}
